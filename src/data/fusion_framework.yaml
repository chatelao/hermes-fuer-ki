framework:
  name: "Fusion Skill & RACI Framework"
  version: "1.0.0"
  roles:
    - id: "role_handler_start"
      name: "Handler of the Start (Strategic)"
      description: "Focuses on the 'Why' and 'Whether' of the project."
      accountability: "Initializing the project, defining the vision, securing funding, and setting the 'Definition of Success'."
      human_interaction: "Decisions on authorization to invest and project closure."
      responsibilities:
        - "Initializing the project and defining core vision"
        - "Securing funding and resources"
        - "Setting strategic success metrics"
        - "Authorizing investment at key decision points"
        - "Final authorization of project closure"
      interactions:
        - role_id: "role_handler_conflicts"
          description: "Aligns on strategic priorities and resource allocation."
        - role_id: "role_ai_orchestrator"
          description: "Receives real-time status feeds and benefit realization evidence."
      interaction_guide: "The Handler of the Start focuses on strategic value. They should be consulted for all major investment decisions and when the fundamental project vision is questioned."
      mapping:
        Scrum: "Product Owner"
        PRINCE2: "Executive"
        Hermes: "Auftraggeber"
        RUP: "Project Manager"
        V-Modell-XT: "Auftraggeber"
    - id: "role_handler_conflicts"
      name: "Handler of Conflicts (Governance)"
      description: "Focuses on priority clashes and stakeholder alignment."
      accountability: "Resolving priority clashes, resource competition, and stakeholder misalignments."
      human_interaction: "High-level mediation and value-based prioritization."
      responsibilities:
        - "Resolving priority clashes between stakeholders"
        - "Managing resource competition across workstreams"
        - "Resolving stakeholder misalignments"
        - "Prioritizing the strategic backlog"
        - "Defining and maintaining governance guardrails"
      interactions:
        - role_id: "role_handler_start"
          description: "Aligns on project goals and high-level priorities."
        - role_id: "role_delivery_specialist"
          description: "Mediates during resource or priority conflicts within the delivery team."
      interaction_guide: "The Handler of Conflicts provides high-level mediation. They act when there is a lack of clarity on priorities or when competing interests threaten project progress."
      mapping:
        Scrum: "Product Owner / Scrum Master"
        PRINCE2: "Project Board"
        Hermes: "Anwendervertreter"
        RUP: "CCB / Project Manager"
        V-Modell-XT: "Lenkungsausschuss"
    - id: "role_handler_exceptions"
      name: "Handler of Exceptions (Tactical)"
      description: "Focuses on managing deviations and risks."
      accountability: "Handling deviations from the plan, risk materialization, and 'Out of Tolerance' events."
      human_interaction: "Intervention when AI-guided automation hits a boundary."
      responsibilities:
        - "Handling deviations from the operational plan"
        - "Managing risk materialization and mitigation"
        - "Resolving 'Out of Tolerance' events flagged by AI"
        - "Developing and approving exception plans"
        - "Guiding tactical course corrections"
      interactions:
        - role_id: "role_ai_orchestrator"
          description: "Monitors for tolerance breaches and flags exceptions for human intervention."
        - role_id: "role_delivery_specialist"
          description: "Guides technical adjustments during exception handling and risk mitigation."
      interaction_guide: "The Handler of Exceptions intervenes when AI-guided automation hits a boundary. They provide tactical guidance during unforeseen events and authorize deviations from the baseline plan."
      mapping:
        Scrum: "Scrum Master / Developers"
        PRINCE2: "Project Manager (Manage by Exception)"
        Hermes: "Projektleiter"
        RUP: "Project Manager / Risk Manager"
        V-Modell-XT: "Projektleiter"
    - id: "role_ai_orchestrator"
      name: "AI Orchestrator (Operational)"
      description: "Handles day-to-day workflow management and observability."
      accountability: "Day-to-day workflow management, progress tracking, deliverable linking, and documentation maintenance."
      human_interaction: "Provides real-time transparency and bottleneck detection to human handlers."
      responsibilities:
        - "Managing daily workflow and task orchestration"
        - "Tracking progress and resource utilization"
        - "Maintaining deliverable linking and traceability"
        - "Automating status reporting and documentation"
        - "Identifying and flagging bottlenecks proactively"
      interactions:
        - role_id: "role_handler_start"
          description: "Provides strategic overview, health feeds, and closure evidence."
        - role_id: "role_handler_exceptions"
          description: "Alerts on tolerance deviations and provides data for exception planning."
        - role_id: "role_delivery_specialist"
          description: "Coordinates daily tasks, ensures standard compliance, and maintains the traceability ledger."
      interaction_guide: "The AI Orchestrator ensures machine-led operational efficiency. It acts as the primary source of truth for project status and provides the data required for human decision-making."
      mapping:
        Scrum: "Tooling / Scrum Master"
        PRINCE2: "Project Support"
        Hermes: "Projektunterstützung"
        RUP: "Project Manager (Admin)"
        V-Modell-XT: "Projektleiter (Admin)"
    - id: "role_delivery_specialist"
      name: "Delivery Specialist (Technical)"
      description: "Focuses on creation of deliverables and implementation."
      accountability: "Creation of deliverables, quality assurance, and technical implementation."
      human_interaction: "Expert execution guided by AI-defined standards."
      responsibilities:
        - "Creating technical and project deliverables"
        - "Implementing system components according to specifications"
        - "Ensuring quality and 'Definition of Done' compliance"
        - "Generating evidence for quality and compliance"
        - "Defining and maintaining system architecture"
      interactions:
        - role_id: "role_ai_orchestrator"
          description: "Reports daily progress, links artifacts to the traceability ledger, and follows automated standards."
        - role_id: "role_handler_exceptions"
          description: "Receives guidance on technical exceptions and contributes to risk mitigation strategies."
      interaction_guide: "The Delivery Specialist focuses on expert execution. They work within the framework established by the AI Orchestrator and collaborate with Handlers to ensure high-quality, compliant output."
      mapping:
        Scrum: "Developers"
        PRINCE2: "Team Member"
        Hermes: "Ersteller"
        RUP: "Implementer / Architect"
        V-Modell-XT: "Projektteamrollen"

  deliverables:
    - id: "del_vision"
      name: "Project Vision"
      description: "High-level goal and definition of success."
      accountability_id: "role_handler_start"
      mapping: "RUP Vision, V-Modell Projektvorschlag"
    - id: "del_business_case"
      name: "Business Case"
      description: "Economic viability and justification for the project."
      accountability_id: "role_handler_start"
      mapping: "PRINCE2 Business Case, Hermes Business Case"
    - id: "del_strategic_backlog"
      name: "Strategic Backlog"
      description: "Comprehensive list of desired outcomes."
      accountability_id: "role_handler_conflicts"
      mapping: "Scrum Product Backlog"
    - id: "del_governance_guardrails"
      name: "Governance Guardrails"
      description: "Priorities and decision-making frameworks."
      accountability_id: "role_handler_conflicts"
      mapping: "PRINCE2 Project Brief (Governance part)"
    - id: "del_risk_register"
      name: "Risk Register"
      description: "List of identified risks and mitigation strategies."
      accountability_id: "role_handler_exceptions"
      mapping: "PRINCE2 Risk Register, RUP Risk List"
    - id: "del_tolerance_baseline"
      name: "Tolerance Baseline"
      description: "Defined boundaries for autonomous AI operation."
      accountability_id: "role_handler_exceptions"
      mapping: "PRINCE2 Tolerances"
    - id: "del_operational_plan"
      name: "Integrated Operational Plan"
      description: "Dynamic plan for current and upcoming work cycles."
      accountability_id: "role_ai_orchestrator"
      mapping: "PRINCE2 Stage Plan, RUP Iteration Plan"
    - id: "del_status_feed"
      name: "Automated Status Feed"
      description: "Real-time, transparent data stream of progress and health."
      accountability_id: "role_ai_orchestrator"
      mapping: "PRINCE2 Highlight Report"
    - id: "del_traceability_ledger"
      name: "Unified Traceability Ledger"
      description: "Immutable record of requirements, changes, and quality."
      accountability_id: "role_ai_orchestrator"
      mapping: "V-Modell Produktbibliothek"
    - id: "del_system_architecture"
      name: "System Architecture"
      description: "High-level technical design and structure."
      accountability_id: "role_delivery_specialist"
      mapping: "RUP SAD, V-Modell Systemarchitektur"
    - id: "del_implementation_specs"
      name: "Implementation Specs"
      description: "Detailed requirements for implementation."
      accountability_id: "role_delivery_specialist"
      mapping: "Hermes System-Spezifikation"
    - id: "del_increment"
      name: "Deliverable Increment"
      description: "Usable, verified product or service component."
      accountability_id: "role_delivery_specialist"
      mapping: "Scrum Increment, PRINCE2 Product"
    - id: "del_quality_evidence"
      name: "Quality & Compliance Evidence"
      description: "Verification results ensuring the 'Definition of Done'."
      accountability_id: "role_delivery_specialist"
      mapping: "V-Modell Prüfprotokoll"

  process_steps:
    - id: "step_starting_decision"
      name: "The Starting Decision"
      primary_role_id: "role_handler_start"
      objective: "Establish the 'Why' and 'Whether'."
      activities:
        - "Visioning"
        - "High-level business case development"
      decision_point: "Authorization to Invest"
      outputs:
        - "del_vision"
        - "del_business_case"
    - id: "step_alignment_decision"
      name: "The Alignment Decision"
      primary_role_id: "role_handler_conflicts"
      objective: "Resolve competing priorities and define governance guardrails."
      activities:
        - "Backlog prioritization"
        - "Setting tolerance levels"
      decision_point: "Commitment to Scope & Priorities"
      outputs:
        - "del_strategic_backlog"
        - "del_governance_guardrails"
    - id: "step_execution_loop"
      name: "The Execution Loop"
      primary_role_id: "role_ai_orchestrator"
      objective: "Continuous delivery of value."
      activities:
        - "Iterative planning"
        - "Development"
        - "Automated testing"
      decision_point: "Continuous Go/No-Go"
      inputs:
        - "del_strategic_backlog"
      outputs:
        - "del_increment"
        - "del_operational_plan"
        - "del_status_feed"
        - "del_traceability_ledger"
    - id: "step_intervention_decision"
      name: "The Intervention Decision"
      primary_role_id: "role_handler_exceptions"
      objective: "Manage deviations that exceed AI-managed tolerances."
      activities:
        - "Risk mitigation"
        - "Exception planning"
      decision_point: "Course Correction or Pivot"
      outputs:
        - "del_risk_register"
        - "del_tolerance_baseline"
    - id: "step_realization_decision"
      name: "The Realization Decision"
      primary_role_id: "role_handler_start"
      objective: "Confirm value delivery and close the loop."
      activities:
        - "Final acceptance"
        - "Benefit realization review"
      decision_point: "Authorization of Closure"
      inputs:
        - "del_increment"
      outputs:
        - "del_quality_evidence"
